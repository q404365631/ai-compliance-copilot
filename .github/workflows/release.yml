name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    name: Build, Release & Publish
    # Skip commits created by this workflow itself (version bumps)
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      # ── Versioning ────────────────────────────────────────────────────────
      - name: Bump patch version
        id: version
        run: |
          node scripts/bump-version.js
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Bumped to $VERSION"

      - name: Commit & tag version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            package.json \
            apps/extension/package.json \
            packages/detection-engine/package.json \
            packages/policy-engine/package.json \
            packages/shared-types/package.json
          git commit -m "chore: release v${{ steps.version.outputs.version }} [skip ci]"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin main --follow-tags

      # ── Package extension ─────────────────────────────────────────────────
      - name: Zip extension dist
        run: |
          cd apps/extension/dist
          zip -r "${{ github.workspace }}/ai-compliance-extension-v${{ steps.version.outputs.version }}.zip" .
          echo "Created extension zip"

      # ── GitHub Release ────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: ai-compliance-extension-v${{ steps.version.outputs.version }}.zip
