name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    name: Build, Release & Publish
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      # Mint a short-lived token from the release-bot GitHub App so the
      # version-bump push can bypass the branch ruleset (the App is in the
      # ruleset bypass list; github-actions[bot] cannot be added there).
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: "@lennardgeissler"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      # ── Versioning ────────────────────────────────────────────────────────
      - name: Bump patch version
        id: version
        run: |
          node scripts/bump-version.js
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Commit & tag version bump
        run: |
          git config user.name  "release-bot[bot]"
          git config user.email "release-bot[bot]@users.noreply.github.com"
          git add \
            package.json \
            apps/extension/package.json \
            packages/detection-engine/package.json \
            packages/policy-engine/package.json \
            packages/shared-types/package.json
          git commit -m "chore: release v${{ steps.version.outputs.version }} [skip ci]"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin main --follow-tags

      # ── Package extension ─────────────────────────────────────────────────
      - name: Zip extension dist
        run: |
          cd apps/extension/dist
          zip -r "${{ github.workspace }}/ai-compliance-extension-v${{ steps.version.outputs.version }}.zip" .

      # ── GitHub Release ────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: ai-compliance-extension-v${{ steps.version.outputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      # ── GitHub Packages (npm) ─────────────────────────────────────────────
      # Build a clean publish directory: only the bundled dist + a slim
      # package.json without workspace:* dev/runtime deps, so the artifact
      # is installable and visible under the repo's "Packages" tab.
      - name: Prepare npm publish dir
        run: node scripts/prepare-npm-publish.mjs
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Publish to GitHub Packages
        run: npm publish --access restricted
        working-directory: .release-publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
