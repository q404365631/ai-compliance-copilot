name: False positive / negative
description: A detection rule fired incorrectly or missed something it should catch
labels: ["detection", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        **Do not paste real secrets or PII.** Use synthetic or redacted samples.
  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - False positive (fired, shouldn't have)
        - False negative (should have fired, didn't)
    validations:
      required: true
  - type: input
    id: rule
    attributes:
      label: Detection rule / category
      placeholder: "e.g. iban, api-key, pii-email"
    validations:
      required: true
  - type: textarea
    id: sample
    attributes:
      label: Sample input (synthetic!)
      render: text
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Extension version
    validations:
      required: true
